# Local development stack — all four services in Docker.
#
# Quick start:
#   cp .env.example .env          # fill in ANTHROPIC_API_KEY / OPENAI_API_KEY
#   docker-compose up -d          # starts db, backend, ingestion, frontend
#   docker-compose run --rm seed  # seed the database (first time only)
#
# The frontend Vite dev server runs on http://localhost:5173
# The backend API is on http://localhost:8000
# The database is reachable at localhost:5432

version: "3.9"

services:

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pass}
      POSTGRES_DB:       ${POSTGRES_DB:-ev_policy_intel}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ev_policy_intel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@db:5432/${POSTGRES_DB:-ev_policy_intel}
      CORS_ORIGINS:  http://localhost:5173
    working_dir: /app/backend
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./ingestion:/app/ingestion
    depends_on:
      db:
        condition: service_healthy

  # ── Ingestion monitor ────────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@db:5432/${POSTGRES_DB:-ev_policy_intel}
    working_dir: /app
    command: python -m ingestion.main
    volumes:
      - ./backend:/app/backend
      - ./ingestion:/app/ingestion
      - ingestion_state:/app/ingestion/state
    depends_on:
      - backend

  # ── Frontend (Vite dev server) ───────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install --prefer-offline && npm run dev"
    depends_on:
      - backend

  # ── One-shot seed runner (run with: docker-compose run --rm seed) ────────────
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-pass}@db:5432/${POSTGRES_DB:-ev_policy_intel}
    working_dir: /app/backend
    command: python seed.py
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools
    restart: "no"

volumes:
  pgdata:
  ingestion_state:
  frontend_modules:
