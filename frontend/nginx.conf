server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Long-lived cache for hashed static assets (Vite fingerprints filenames)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|svg|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy — forward to the backend container.
    # SSE (chat streaming) requires buffering off and a generous read timeout.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
    }

    # SPA routing — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
